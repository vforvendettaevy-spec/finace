<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard PEA + CTO + Crypto - LUKA_INVEST_PRO</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📊</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#06060f;
  --bg-surface:#0d0d1a;
  --bg-elevated:#12121f;
  --bg-glass:rgba(255,255,255,0.032);
  --bg-glass-hover:rgba(255,255,255,0.055);
  --border-subtle:rgba(255,255,255,0.06);
  --border-hover:rgba(255,255,255,0.12);
  --border-accent:rgba(107,87,255,0.35);
  --accent:#6B57FF;
  --accent-soft:#8B77FF;
  --accent-glow:rgba(107,87,255,0.18);
  --accent-glow-sm:rgba(107,87,255,0.1);
  --green:#00D27F;
  --red:#FF5370;
  --orange:#FF8C42;
  --text-primary:#F2F2FF;
  --text-secondary:rgba(232,230,255,0.9);
  --text-muted:rgba(210,206,255,0.72);
  --text-ultra-muted:rgba(190,185,255,0.52);
  --font-display:'Syne',sans-serif;
  --font-numbers:'Outfit',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:22px;
  --radius-xl:28px;
  --shadow-card:0 1px 0 rgba(255,255,255,0.04) inset,0 -1px 0 rgba(0,0,0,0.3) inset;
  --transition:cubic-bezier(.4,0,.2,1)
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-body);
  background:var(--bg-base);
  color:var(--text-primary);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%,rgba(107,87,255,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%,rgba(0,210,127,0.04) 0%,transparent 60%);
  background-attachment:fixed
}
.container{max-width:1440px;margin:0 auto;padding:24px 28px}
.header{
  background:var(--bg-elevated);padding:32px 40px;border-radius:var(--radius-xl);margin-bottom:8px;
  position:relative;overflow:hidden;border:1px solid var(--border-subtle);box-shadow:var(--shadow-card);
  display:flex;align-items:center;justify-content:space-between;gap:24px;
}
.header h1{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--text-primary);}
.header h1 span{color:var(--accent-soft)}
.header-target{font-family:var(--font-numbers);font-size:38px;font-weight:800;color:var(--text-primary);}
.folder-tabs{display:flex;gap:2px;padding:5px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-bottom:none;border-radius:var(--radius-md) var(--radius-md) 0 0;width:fit-content;}
.folder-tab{background:transparent;color:var(--text-muted);border:none;padding:9px 16px;border-radius:var(--radius-sm);font-weight:500;cursor:pointer;font-size:12.5px;transition:all .25s;}
.folder-tab.active{background:rgba(107,87,255,0.15);color:#c4b9ff;font-weight:600;}
.page-content{background:var(--bg-elevated);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);padding:32px;border:1px solid var(--border-subtle);min-height:600px;}
.page{display:none}
.page.active{display:block;}
.hero-banner{background:linear-gradient(135deg,rgba(107,87,255,0.18) 0%,rgba(107,87,255,0.06) 60%,rgba(0,210,127,0.05) 100%);padding:32px 36px;border-radius:var(--radius-xl);margin-bottom:24px;border:1px solid rgba(107,87,255,0.2);position:relative;}
.params-section{background:var(--bg-glass);border-radius:var(--radius-lg);padding:26px;margin-bottom:24px;border:1px solid var(--border-subtle)}
.params-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.param-item{background:var(--bg-surface);padding:14px 16px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);}
.param-item label{display:block;font-weight:600;color:var(--text-muted);margin-bottom:8px;font-size:10.5px;text-transform:uppercase;}
.param-item input{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);font-size:15px;background:rgba(0,0,0,0.25);color:var(--text-primary);}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:13px 32px;border-radius:99px;font-weight:600;cursor:pointer;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:12px;margin:24px 0}
.stat-card{background:var(--bg-surface);padding:22px 20px;border-radius:var(--radius-lg);border:1px solid var(--border-subtle);}
.stat-value{font-family:var(--font-numbers);font-size:24px;font-weight:700;color:var(--text-primary);}
table{width:100%;border-collapse:collapse;margin-top:14px}
th{color:var(--text-ultra-muted);font-weight:600;font-size:9.5px;text-transform:uppercase;padding:11px 14px;text-align:left;border-bottom:1px solid var(--border-subtle)}
td{padding:14px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-secondary);font-size:13px;}
.btn-add{background:var(--accent);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:600;}
.btn-delete{background:rgba(255,83,112,0.1);color:var(--red);border:1px solid var(--red);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:10px;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Dashboard <span>Invest</span></h1>
      <p>PEA · CTO · Crypto · Suivi complet</p>
    </div>
    <div class="header-right">
      <div class="header-target" id="totalGlobalHeader">0 €</div>
    </div>
  </div>
  <div class="folder-tabs">
    <button class="folder-tab active" onclick="switchPage('overview')">📊 Vue d'ensemble</button>
    <button class="folder-tab" onclick="switchPage('revenus-page')">💰 Mes Revenus</button>
    <button class="folder-tab" onclick="switchPage('pea')">📈 PEA</button>
    <button class="folder-tab" onclick="switchPage('crypto')">₿ Crypto</button>
  </div>
  
  <div class="page-content">
    <div id="overview" class="page active">
      <div class="hero-banner">
        <div style="font-size:11px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;">Capital Actuel</div>
        <div style="font-family:var(--font-numbers); font-size:44px; font-weight:800;" id="capitalTotalHero">0 €</div>
      </div>
      <div class="params-section">
        <div class="params-grid">
          <div class="param-item"><label>💰 Revenu mensuel (€)</label><input id="revenu" type="number" value="1200"/></div>
          <div class="param-item"><label>📈 Investissement Mensuel (€)</label><input id="investissementMensuel" type="number" value="900"/></div>
          <div class="param-item"><label>🎂 Âge actuel</label><input id="age" type="number" value="17"/></div>
        </div>
        <div style="text-align:center;margin-top:24px"><button class="btn-primary" onclick="calculer()">Calculer</button></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label" style="font-size:10.5px; color:var(--text-muted);">Total Investi</div><div class="stat-value" id="valeurInvestie">0 €</div></div>
        <div class="stat-card"><div class="stat-label" style="font-size:10.5px; color:var(--text-muted);">Part de revenus investie</div><div class="stat-value" id="statTauxInvest" style="color:var(--green)">0%</div></div>
      </div>
    </div>

    <div id="revenus-page" class="page">
        <div class="hero-banner" style="background: linear-gradient(135deg, rgba(0, 210, 127, 0.15) 0%, rgba(0, 210, 127, 0.05) 100%);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div style="font-size:11px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;">Cumul des revenus (Vie)</div>
                    <div style="font-family:var(--font-numbers); font-size:44px; font-weight:800;" id="totalRevenusVie">0 €</div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:11px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;">Taux d'investissement</div>
                    <div style="font-family:var(--font-numbers); font-size:44px; font-weight:800; color:var(--green);" id="tauxInvestRevenus">0%</div>
                </div>
            </div>
        </div>

        <div class="params-section">
            <div style="font-family:var(--font-display); font-size:13px; font-weight:700; margin-bottom:20px; text-transform:uppercase;">➕ Enregistrer une paye</div>
            <div class="params-grid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); align-items: flex-end;">
                <div class="param-item"><label>Date</label><input type="date" id="revDate"></div>
                <div class="param-item"><label>Mois</label><input type="text" id="revMois" placeholder="Ex: Octobre"></div>
                <div class="param-item"><label>Année</label><input type="number" id="revAnnee" value="2024"></div>
                <div class="param-item"><label>Montant (€)</label><input type="number" id="revMontant" placeholder="Ex: 1200"></div>
                <button class="btn-add" onclick="ajouterRevenu()">Ajouter</button>
            </div>
        </div>

        <div style="background:var(--bg-glass); border-radius:var(--radius-lg); padding:26px; border:1px solid var(--border-subtle);">
            <div style="font-family:var(--font-display); font-size:13px; font-weight:700; margin-bottom:20px; text-transform:uppercase;">📜 Historique</div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Mois / Année</th>
                        <th>Montant</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="corpsRevenus"></tbody>
            </table>
        </div>
    </div>

    <div id="pea" class="page"><h2>Détails PEA...</h2></div>
    <div id="crypto" class="page"><h2>Détails Crypto...</h2></div>
  </div>
</div>

<script>
// --- NAVIGATION ---
function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    event.currentTarget.classList.add('active');
}

// --- LOGIQUE REVENUS ---
let revenusData = JSON.parse(localStorage.getItem('revenus_luka')) || [];

function ajouterRevenu() {
    const date = document.getElementById('revDate').value;
    const mois = document.getElementById('revMois').value;
    const annee = document.getElementById('revAnnee').value;
    const montant = parseFloat(document.getElementById('revMontant').value);

    if(!date || !montant) return alert("Remplis au moins la date et le montant !");

    revenusData.push({ id: Date.now(), date, mois, annee, montant });
    localStorage.setItem('revenus_luka', JSON.stringify(revenusData));
    
    document.getElementById('revMontant').value = "";
    renderRevenus();
    calculer();
}

function supprimerRevenu(id) {
    revenusData = revenusData.filter(r => r.id !== id);
    localStorage.setItem('revenus_luka', JSON.stringify(revenusData));
    renderRevenus();
    calculer();
}

function renderRevenus() {
    const corps = document.getElementById('corpsRevenus');
    corps.innerHTML = "";
    let cumul = 0;

    revenusData.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(r => {
        cumul += r.montant;
        corps.innerHTML += `
            <tr>
                <td>${r.date}</td>
                <td>${r.mois} ${r.annee}</td>
                <td style="color:var(--green); font-weight:bold;">${r.montant.toLocaleString()} €</td>
                <td><button class="btn-delete" onclick="supprimerRevenu(${r.id})">Supprimer</button></td>
            </tr>
        `;
    });
    document.getElementById('totalRevenusVie').innerText = cumul.toLocaleString() + " €";
}

// --- CALCULS GLOBAUX ---
function calculer() {
    // On récupère les valeurs des inputs
    const investMensuel = parseFloat(document.getElementById('investissementMensuel').value) || 0;
    
    // Simulation simple du capital (ex: investissement annuel)
    const capitalSimule = investMensuel * 12; 
    
    document.getElementById('capitalTotalHero').innerText = capitalSimule.toLocaleString() + " €";
    document.getElementById('totalGlobalHeader').innerText = capitalSimule.toLocaleString() + " €";
    document.getElementById('valeurInvestie').innerText = capitalSimule.toLocaleString() + " €";

    // STATISTIQUES REVENUS vs INVESTISSEMENT
    let totalGagne = revenusData.reduce((acc, curr) => acc + curr.montant, 0);
    let taux = totalGagne > 0 ? (capitalSimule / totalGagne) * 100 : 0;

    document.getElementById('tauxInvestRevenus').innerText = taux.toFixed(1) + "%";
    document.getElementById('statTauxInvest').innerText = taux.toFixed(1) + "%";
}

// Init
renderRevenus();
calculer();
</script>
</body>
</html>
