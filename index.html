<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard PEA + CTO + Crypto - LUKA_INVEST_PRO</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📊</text></svg>" />
<style>
/* === CSS STRICTEMENT INCHANGÉ === */
</style>
</head>

<body>
<!-- === HTML STRICTEMENT INCHANGÉ === -->

<script>
let historiquePEA = [];
let historiqueCTO = [];
let historiqueBTC = [];
let historiqueETH = [];
let coursBTC = 0;
let coursETH = 0;
let coursWPEA = 0;
let coursPAEEM = 0;

/* ====== NOUVELLE FONCTION ====== */
function formatEuro4(val) {
  if (!val || isNaN(val)) return '0,0000 €';
  return val.toLocaleString('fr-FR', {
    minimumFractionDigits: 4,
    maximumFractionDigits: 4
  }) + ' €';
}

window.onload = function () {
  try {
    const saved = localStorage.getItem('dashboardPEA_CTO_Crypto_v2');
    if (saved) {
      const data = JSON.parse(saved);

      Object.keys(data).forEach(key => {
        const el = document.getElementById(key);
        if (el && el.type === 'number') el.value = data[key];
      });

      historiquePEA = data.historiquePEA || [];
      historiqueCTO = data.historiqueCTO || [];
      historiqueBTC = data.historiqueBTC || [];
      historiqueETH = data.historiqueETH || [];

      coursWPEA = data.coursWPEA || 0;
      coursPAEEM = data.coursPAEEM || 0;

      if (coursWPEA > 0) {
        document.getElementById('coursWPEA').textContent = formatEuro4(coursWPEA);
        document.getElementById('nouveauCoursWPEA').value = coursWPEA;
      }

      if (coursPAEEM > 0) {
        document.getElementById('coursPAEEM').textContent = formatEuro4(coursPAEEM);
        document.getElementById('nouveauCoursPAEEM').value = coursPAEEM;
      }
    }
  } catch (e) {
    console.log('Pas de sauvegarde');
  }

  rafraichirCours();
  calculer();
};

function mettreAJourCoursETF() {
  const wpea = Number(document.getElementById('nouveauCoursWPEA').value);
  const paeem = Number(document.getElementById('nouveauCoursPAEEM').value);

  if (wpea > 0) {
    coursWPEA = wpea;
    document.getElementById('coursWPEA').textContent = formatEuro4(coursWPEA);
  }

  if (paeem > 0) {
    coursPAEEM = paeem;
    document.getElementById('coursPAEEM').textContent = formatEuro4(coursPAEEM);
  }

  if (wpea > 0 || paeem > 0) {
    calculer();
    alert('✅ Cours des ETF mis à jour !');
  } else {
    alert('❌ Entre au moins un cours valide !');
  }
}

/* === TOUT LE RESTE DU JS EST STRICTEMENT IDENTIQUE === */

function formatEuroDecimal(val, signe = false) {
  if (!val || isNaN(val)) return '0,00 €';
  const fmt = val.toLocaleString('fr-FR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }) + ' €';
  return signe && val >= 0 ? '+ ' + fmt : fmt;
}

function formatEuro(val, signe = false) {
  if (!val || isNaN(val)) return '0 €';
  const fmt = Math.round(val).toLocaleString('fr-FR') + ' €';
  return signe && val >= 0 ? '+ ' + fmt : fmt;
}
</script>
</body>
</html>
